name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build app
        run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/
      - name: Wrap installer with setup script
        run: |
          tar -xzf artifacts/stable-linux-*-Setup.tar.gz ./installer
          chmod +x installer
          cp scripts/linux-install-template.sh Nab-Linux.sh
          LINES=$(wc -l < Nab-Linux.sh)
          LINES=$((LINES + 1))
          sed -i "s/__LINES__/$LINES/" Nab-Linux.sh
          base64 -w 0 installer >> Nab-Linux.sh
          chmod +x Nab-Linux.sh
      - uses: softprops/action-gh-release@v1
        with:
          files: Nab-Linux.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build app
        run: bunx electrobun build --env=stable
      - name: List artifacts
        run: ls -la artifacts/ && find build/ -type f
      - name: Create DMG
        run: |
          APP=$(find build/stable-macos-*/ -maxdepth 1 -name "*.app" -type d | head -1)
          echo "=== Found: $APP ==="
          mkdir dmg-staging
          cp -r "$APP" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Nab" -srcfolder dmg-staging -ov -format UDZO Nab-macOS.dmg
      - uses: softprops/action-gh-release@v1
        with:
          files: Nab-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build app
        run: bunx electrobun build --env=stable
      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem artifacts/ -Recurse
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Build single-file installer (NSIS)
        shell: pwsh
        run: |
          $src = Get-ChildItem artifacts/ -Filter "*Setup.zip" | Select-Object -First 1
          Write-Host "=== Using: $($src.FullName) ==="
          & "C:\Program Files\7-Zip\7z.exe" x $src.FullName -o"setup_extracted"
          $iconSrc = "$env:GITHUB_WORKSPACE\resources\icon_transparent.ico"
          Copy-Item $iconSrc installer-icon.ico
          Copy-Item installer-icon.ico setup_extracted\installer-icon.ico
          Copy-Item scripts/installer.nsi installer.nsi
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DICON_PATH=installer-icon.ico installer.nsi
          Write-Host "=== Created: $(Get-Item Nab-Windows.exe | Select-Object Name, Length) ==="
      - uses: softprops/action-gh-release@v1
        with:
          files: Nab-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
