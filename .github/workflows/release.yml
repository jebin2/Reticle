name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package (AppImage + tar.gz)
        run: npx electron-builder --linux --config electron-builder.config.ts --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-14          # Apple Silicon (arm64)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package (dmg + zip)
        run: npx electron-builder --mac --config electron-builder.config.ts --publish never
        env:
          # Skip code-signing in CI — add CSC_LINK / CSC_KEY_PASSWORD secrets to enable it
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package (NSIS installer)
        run: npx electron-builder --win --config electron-builder.config.ts --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*Setup*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
